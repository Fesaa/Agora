<p-table [value]="meetings">
    <ng-template ptemplate="header">
      <tr>
        <th>Time</th>
        <th>Office</th>
        <th>Participants</th>
      </tr>
    </ng-template>
    <ng-template ptemplate="body" let-meeting>
      <tr>
        <td>{{ meeting.time }}</td>
        <td>{{ meeting.office }}</td>
        <td>{{ meeting.participants.join(', ') }}</td>
      </tr>
    </ng-template>
  </p-table>
